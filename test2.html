<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SolarClean AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/apexcharts@latest/dist/apexcharts.css" rel="stylesheet">
    <style>
        :root {
            --primary: #00cfc8;
            --secondary: #0066ff;
            --dark: #0a192f;
            --light: #f8f9fa;
        }

        body {
            background: var(--dark);
            color: var(--light);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            margin: 0;
            padding: 0;
            animation: fadeIn 0.8s ease-out;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        .header {
            text-align: center;
            padding: 4rem 0;
        }

        .title {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            animation: float 3s ease-in-out infinite;
        }

        .subtitle {
            font-size: 1.25rem;
            color: rgba(255, 255, 255, 0.9);
            animation: slideIn 1s ease-out;
        }

        .upload-section {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border-radius: 1.5rem;
            padding: 3rem;
            margin: 2rem 0;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .upload-box {
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 1rem;
            padding: 3rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .upload-box:hover {
            border-color: var(--primary);
            background: rgba(0, 207, 200, 0.05);
        }

        .btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1rem;
            transition: all 0.3s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 207, 200, 0.4);
        }

        .result-card {
            background: linear-gradient(145deg, rgba(10, 25, 47, 0.8), rgba(10, 25, 47, 0.6));
            border-radius: 1.5rem;
            padding: 2rem;
            margin-top: 2rem;
            display: none;
            animation: cardAppear 0.6s ease-out;
        }

        .chart-container {
            margin: 2rem 0;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 1rem;
            padding: 1rem;
        }

        .progress-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            z-index: 1000;
            display: none;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            width: 0;
            transition: width 0.4s ease-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes cardAppear {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="progress-container" id="progressContainer">
        <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="container">
        <div class="header">
            <h1 class="title">SolarClean AI</h1>
            <p class="subtitle">Advanced Solar Panel Dust Prediction System</p>
        </div>

        <div class="upload-section">
            <form id="uploadForm" enctype="multipart/form-data">
                <div class="upload-box" id="dropArea">
                    <i class="fas fa-cloud-upload-alt fa-3x mb-3"></i>
                    <h3>Drag & Drop or Click to Upload</h3>
                    <p>Supported formats: PNG, JPG, JPEG</p>
                    <input type="file" id="fileInput" name="file" accept="image/*" style="display: none;">
                </div>
                <button type="submit" class="btn" id="analyzeBtn">
                    <i class="fas fa-rocket mr-2"></i> Analyze Now
                </button>
            </form>

            <div class="alert error" id="errorAlert"></div>

            <div class="result-card" id="resultCard">
                <h2>Analysis Result</h2>
                <div class="chart-container" id="gaugeChart"></div>
                <div class="chart-container" id="trendChart"></div>
                <div id="recommendation">
                    <h3>Maintenance Recommendation</h3>
                    <p id="recommendationText"></p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <script>
        let analysisHistory = [];
        let gaugeChart = null;
        let trendChart = null;

        document.addEventListener('DOMContentLoaded', function() {
            const rootStyles = getComputedStyle(document.documentElement);
            const primaryColor = rootStyles.getPropertyValue('--primary').trim();
            const secondaryColor = rootStyles.getPropertyValue('--secondary').trim();

            // Drag and drop handlers
            const dropArea = document.getElementById('dropArea');
            const fileInput = document.getElementById('fileInput');
            
            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
                dropArea.addEventListener(eventName, preventDefaults, false);
            });

            ['dragenter', 'dragover'].forEach(eventName => {
                dropArea.addEventListener(eventName, highlight, false);
            });

            ['dragleave', 'drop'].forEach(eventName => {
                dropArea.addEventListener(eventName, unhighlight, false);
            });

            dropArea.addEventListener('drop', handleDrop, false);
            dropArea.addEventListener('click', () => fileInput.click());

            // Form submission
            document.getElementById('uploadForm').addEventListener('submit', async function(e) {
                e.preventDefault();
                const file = fileInput.files[0];
                if (!file) return showError('Please select an image first');

                const progressContainer = document.getElementById('progressContainer');
                const progressBar = document.getElementById('progressBar');
                const analyzeBtn = document.getElementById('analyzeBtn');

                // Show progress
                progressContainer.style.display = 'block';
                progressBar.style.width = '0%';
                analyzeBtn.disabled = true;
                analyzeBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Analyzing...';

                try {
                    const formData = new FormData();
                    formData.append('file', file);

                    // Update progress bar
                    const progressInterval = setInterval(() => {
                        progressBar.style.width = 
                            Math.min(parseFloat(progressBar.style.width) + 10, 95) + '%';
                    }, 500);

                    const response = await fetch('/analyze', {
                        method: 'POST',
                        body: formData
                    });

                    clearInterval(progressInterval);
                    const data = await response.json();
                    
                    if (!response.ok) throw new Error(data.error || 'Analysis failed');
                    
                    // Finalize progress
                    progressBar.style.width = '100%';
                    setTimeout(() => progressContainer.style.display = 'none', 500);

                    // Update analysis history
                    analysisHistory.push({
                        value: data.dustiness,
                        date: new Date().toLocaleString()
                    });

                    // Update charts
                    updateCharts(data.dustiness, primaryColor, secondaryColor);
                    showRecommendation(data.dustiness);
                    document.getElementById('resultCard').style.display = 'block';

                } catch (error) {
                    showError(error.message);
                    progressContainer.style.display = 'none';
                } finally {
                    analyzeBtn.disabled = false;
                    analyzeBtn.innerHTML = '<i class="fas fa-rocket mr-2"></i> Analyze Now';
                }
            });

            function preventDefaults(e) {
                e.preventDefault();
                e.stopPropagation();
            }

            function highlight(e) {
                dropArea.style.borderColor = primaryColor;
                dropArea.style.backgroundColor = 'rgba(0, 207, 200, 0.1)';
            }

            function unhighlight(e) {
                dropArea.style.borderColor = 'rgba(255, 255, 255, 0.2)';
                dropArea.style.backgroundColor = 'transparent';
            }

            function handleDrop(e) {
                const dt = e.dataTransfer;
                const files = dt.files;
                if (files.length) fileInput.files = files;
            }

            function updateCharts(dustiness, primaryColor, secondaryColor) {
                // Destroy existing charts
                if (gaugeChart) gaugeChart.destroy();
                if (trendChart) trendChart.destroy();

                // Gauge Chart
                gaugeChart = new ApexCharts(document.querySelector("#gaugeChart"), {
                    series: [dustiness],
                    chart: {
                        type: 'radialBar',
                        height: 350
                    },
                    plotOptions: {
                        radialBar: {
                            startAngle: -135,
                            endAngle: 135,
                            hollow: {
                                size: '70%'
                            },
                            track: {
                                background: '#2d2d39'
                            },
                            dataLabels: {
                                name: { show: false },
                                value: {
                                    offsetY: 0,
                                    fontSize: '22px',
                                    color: '#fff',
                                    formatter: function(val) { return val + '%'; }
                                }
                            }
                        }
                    },
                    fill: {
                        type: 'gradient',
                        gradient: {
                            shade: 'dark',
                            type: 'horizontal',
                            gradientToColors: [primaryColor],
                            stops: [0, 100]
                        }
                    },
                    colors: [primaryColor],
                    stroke: {
                        lineCap: 'round'
                    }
                });

                // Trend Chart
                trendChart = new ApexCharts(document.querySelector("#trendChart"), {
                    series: [{
                        name: 'Dust Level',
                        data: analysisHistory.map(entry => entry.value)
                    }],
                    chart: {
                        type: 'line',
                        height: 350,
                        background: 'transparent'
                    },
                    colors: [primaryColor],
                    xaxis: {
                        categories: analysisHistory.map(entry => entry.date),
                        labels: {
                            style: {
                                colors: '#fff'
                            }
                        }
                    },
                    yaxis: {
                        labels: {
                            style: {
                                colors: '#fff'
                            }
                        }
                    },
                    grid: {
                        borderColor: 'rgba(255,255,255,0.1)'
                    },
                    stroke: {
                        width: 3,
                        curve: 'smooth'
                    }
                });

                gaugeChart.render();
                trendChart.render();
            }

            function showRecommendation(value) {
                let recommendation = '';
                if (value < 20) {
                    recommendation = "🌟 Excellent condition! Your solar panels are clean and operating at peak efficiency.";
                } else if (value < 50) {
                    recommendation = "⚠️ Moderate dust accumulation detected. Consider cleaning within the next 2 weeks for optimal performance.";
                } else {
                    recommendation = "🚨 High dust level! Immediate cleaning recommended to prevent significant efficiency loss.";
                }
                document.getElementById('recommendationText').textContent = recommendation;
            }

            function showError(message) {
                const errorAlert = document.getElementById('errorAlert');
                errorAlert.textContent = message;
                errorAlert.style.display = 'block';
                setTimeout(() => errorAlert.style.display = 'none', 5000);
            }
        });
    </script>
</body>
</html>
